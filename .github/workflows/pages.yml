name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'pages/**'
      - 'src/kbbi_js.nim'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download kbbi.db
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            gh release download ${{ github.event.release.tag_name }} \
              --pattern "kbbi.db" \
              --dir pages/ \
              --clobber
          else
            gh release download \
              --pattern "kbbi.db" \
              --dir pages/ \
              --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-
        if: runner.os != 'Windows'

      - name: Install Nim
        uses: nim-lang/setup-nimble-action@v1
        with:
          nimble-version: 'latest'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nimble install -d -y

      - name: Compile kbbi_js → pages/kbbi.js
        run: nimble buildjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Minify JS, CSS and HTML and copy assets
        run: |
          npx uglify-js pages/kbbi.js -o pages/kbbi.tmp.js --compress --mangle
          mv pages/kbbi.tmp.js pages/kbbi.js
          npx uglify-js pages/sw.js -o pages/sw.tmp.js --compress --mangle
          mv pages/sw.tmp.js pages/sw.js
          npx clean-css-cli pages/style.css -o pages/style.tmp.css
          mv pages/style.tmp.css pages/style.css
          npx html-minifier-terser pages/index.html -o pages/index.html --collapse-whitespace --remove-comments --minify-css --minify-js
          cp -rf assets pages/

      - name: Upload Pages artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4