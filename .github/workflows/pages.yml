name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "pages/**"
      - "src/kbbi_js.nim"
      - "src/kbbi/js/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download kbbi.db
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            gh release download ${{ github.event.release.tag_name }} \
              --pattern "kbbi.db" \
              --dir pages/ \
              --clobber
          else
            gh release download \
              --pattern "kbbi.db" \
              --dir pages/ \
              --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload kbbi.db to Hugging Face
        run: |
          pip install huggingface_hub
          python3 - <<'EOF'
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj="pages/kbbi.db",
              path_in_repo="kbbi.db",
              repo_id="univzy/kbbi",
              repo_type="dataset",
              token="${{ secrets.HF_TOKEN }}",
          )
          EOF

      - name: Remove kbbi.db from pages dir
          run: rm pages/kbbi.db

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-nimble-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nimble-

      - name: Install Nim
        uses: nim-lang/setup-nimble-action@v1
        with:
          nimble-version: "latest"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nimble install -d -y

      - name: Compile kbbi_js → pages/kbbi.js
        run: nimble buildjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Minify JS, CSS and HTML and copy assets
        run: |
          npx uglify-js pages/kbbi.js -o pages/kbbi.tmp.js --compress --mangle --toplevel
          mv pages/kbbi.tmp.js pages/kbbi.js
          npx uglify-js pages/sw.js -o pages/sw.tmp.js --compress --mangle --toplevel
          mv pages/sw.tmp.js pages/sw.js
          npx clean-css-cli pages/style.css -o pages/style.tmp.css
          mv pages/style.tmp.css pages/style.css
          npx html-minifier-terser pages/index.html -o pages/index.html --collapse-whitespace --remove-comments --minify-css --minify-js
          cp -rf assets pages/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pages/ --project-name=kbbi
